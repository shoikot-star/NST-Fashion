<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile | NST Fashion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter:wght@400;600&display=swap"
        rel="stylesheet">
</head>

<body class="bg-[#fbf9f1] text-[#1b1c17] font-['Inter']">
    <div class="p-6">
        <a href="{% url 'home' %}" class="text-[10px] font-bold uppercase tracking-[0.3em] hover:text-[#735c00]">← Back
            to Shop</a>
    </div>

    <main class="pt-6 px-6 max-w-lg mx-auto pb-20">
        <h1 class="font-['Playfair_Display'] text-3xl mb-8 border-b border-black/10 pb-4">My Profile</h1>

        <form method="POST" action="{% url 'profile' %}"
            class="space-y-6 bg-white p-8 rounded-3xl shadow-sm border border-black/5">
            {% csrf_token %}

            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label class="text-[10px] uppercase tracking-widest text-gray-400 font-bold">First Name</label>
                    <input type="text" name="first_name" value="{{ user.first_name }}"
                        class="w-full border-b border-black/10 py-2 focus:border-[#735c00] outline-none text-sm bg-transparent">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] uppercase tracking-widest text-gray-400 font-bold">Last Name</label>
                    <input type="text" name="last_name" value="{{ user.last_name }}"
                        class="w-full border-b border-black/10 py-2 focus:border-[#735c00] outline-none text-sm bg-transparent">
                </div>
            </div>

            <div class="space-y-1">
                <label class="text-[10px] uppercase tracking-widest text-gray-400 font-bold">Email Address</label>
                <input type="email" name="email" value="{{ user.email }}"
                    class="w-full border-b border-black/10 py-2 focus:border-[#735c00] outline-none text-sm bg-transparent">
            </div>

            <div class="pt-4 space-y-4">
                <h3 class="text-[11px] uppercase tracking-[0.2em] font-bold text-[#735c00]">Shipping Address</h3>

                <div class="space-y-1">
                    <label class="text-[9px] uppercase text-gray-400">Phone Number</label>
                    <input type="text" name="phone" value="{{ user.profile.phone }}" placeholder="017xxxxxxxx"
                        class="w-full border border-black/5 bg-gray-50 p-3 rounded-xl text-sm focus:ring-1 focus:ring-[#735c00] outline-none">
                </div>

                <div class="space-y-1">
                    <label class="text-[9px] uppercase text-gray-400">Full Address</label>
                    <textarea name="address" rows="2" placeholder="House/Road/Area..."
                        class="w-full border border-black/5 bg-gray-50 p-3 rounded-xl text-sm focus:ring-1 focus:ring-[#735c00] outline-none">{{ user.profile.address }}</textarea>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <input type="text" name="city" placeholder="City" value="{{ user.profile.city }}"
                        class="w-full border border-black/5 bg-gray-50 p-3 rounded-xl text-sm">
                    <input type="text" name="zip_code" placeholder="ZIP" value="{{ user.profile.zip_code }}"
                        class="w-full border border-black/5 bg-gray-50 p-3 rounded-xl text-sm">
                </div>
            </div>

            <button type="submit"
                class="w-full py-4 bg-[#1b1c17] text-white text-[10px] uppercase tracking-[0.2em] font-bold hover:bg-[#735c00] transition-all rounded-xl shadow-lg mt-4">
                Save Changes
            </button>
        </form>
    </main>
</body>

</html>
