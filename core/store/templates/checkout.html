<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | NST Fashion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --primary-bg: #fbf9f1;
            --nst-black: #1a1a1a;
            --text-gray: #6b7280;
        }

        body {
            background-color: var(--primary-bg);
            font-family: 'Inter', sans-serif;
            color: var(--nst-black);
            margin: 0;
            padding: 0;
        }

        .nst-header {
            background: #ffffff;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            padding: 25px 0;
            text-align: center;
            margin-bottom: 50px;
        }

        .nst-logo {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--nst-black);
        }

        .checkout-container {
            max-width: 550px;
            margin: 0 auto 100px auto;
            background: #ffffff;
            padding: 40px;
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.02);
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin-bottom: 30px;
            text-align: center;
        }

        label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 600;
            color: var(--text-gray);
            margin-bottom: 8px;
        }

        .form-control {
            border-radius: 0;
            border: 1px solid #e5e7eb;
            padding: 12px 15px;
            background-color: #fcfcfc;
            font-size: 14px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--nst-black);
            box-shadow: none;
            background-color: #fff;
        }

        .payment-option {
            border: 1px solid #e5e7eb;
            padding: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .payment-option:hover {
            border-color: var(--nst-black);
        }

        .form-check-input:checked+.form-check-label {
            font-weight: 600;
            color: var(--nst-black);
        }

        .order-summary {
            background: #f9fafb;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px dashed #d1d5db;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-order {
            background: var(--nst-black);
            color: #ffffff;
            border: none;
            border-radius: 0;
            padding: 18px;
            width: 100%;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            transition: 0.4s;
            margin-top: 10px;
        }

        .btn-order:hover {
            background: #333;
            letter-spacing: 0.25em;
        }

        footer {
            text-align: center;
            padding: 40px 0;
            color: #9ca3af;
            font-size: 12px;
            border-top: 1px solid #eee;
        }
    </style>
</head>

<body>

    <header class="nst-header">
        <a href="/" class="nst-logo">NST Fashion</a>
    </header>

    <div class="container">
        <div class="checkout-container">
            <h2 class="section-title">Checkout</h2>

            <div class="order-summary">
                <div class="summary-row">
                    <span style="color: #6b7280; font-size: 14px;">Payable Amount:</span>
                    <span style="font-weight: 700; font-size: 18px;">৳ {{ cart.get_total_price }}</span>
                </div>
            </div>

            <form method="POST">
                {% csrf_token %}

                <div class="form-group">
                    <label>Recipient Name</label>
                    <input type="text" name="full_name" class="form-control" placeholder="e.g. Sheikh Soikot" required>
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" name="phone_number" class="form-control" placeholder="01XXXXXXXXX" required>
                </div>

                <div class="form-group">
                    <label>City / District</label>
                    <input type="text" name="city" class="form-control" placeholder="e.g. Dhaka" required>
                </div>

                <div class="form-group">
                    <label>Detailed Address</label>
                    <textarea name="address" class="form-control" rows="3" placeholder="House no, Road, Area details..."
                        required></textarea>
                </div>

                <div class="mt-4 mb-4">
                    <label>Payment Method</label>

                    <div class="form-check payment-option">
                        <input class="form-check-input" type="radio" name="payment_method" id="cod" value="COD" checked>
                        <label class="form-check-label ps-2" for="cod"
                            style="font-size: 13px; text-transform: none; color: inherit; letter-spacing: normal;">
                            Cash on Delivery (COD)
                        </label>
                    </div>

                    <div class="form-check payment-option">
                        <input class="form-check-input" type="radio" name="payment_method" id="online" value="Online">
                        <label class="form-check-label ps-2" for="online"
                            style="font-size: 13px; text-transform: none; color: inherit; letter-spacing: normal;">
                            Online Payment (bKash / Nagad / Card)
                        </label>
                    </div>
                </div>

                <button type="submit" class="btn-order">Confirm Order</button>
            </form>
        </div>
    </div>

    <footer>
        &copy; 2026 NST FASHION | PREMIUM COLLECTION
    </footer>

</body>

</html>
