<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed | NST Fashion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --primary-bg: #fbf9f1;
            --nst-black: #1a1a1a;
            --text-gray: #6b7280;
            --success-green: #15803d;
        }

        body {
            background-color: var(--primary-bg);
            font-family: 'Inter', sans-serif;
            color: var(--nst-black);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .nst-header {
            background: #ffffff;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            padding: 25px 0;
            text-align: center;
        }

        .nst-logo {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--nst-black);
        }

        .success-container {
            max-width: 600px;
            margin: auto;
            background: #ffffff;
            padding: 60px 40px;
            text-align: center;
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.02);
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background: #f0fdf4;
            color: var(--success-green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 40px;
        }

        .status-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 15px;
        }

        .order-info {
            background: #f9fafb;
            padding: 20px;
            margin: 30px 0;
            border-radius: 4px;
            border: 1px dashed #d1d5db;
        }

        .tran-id {
            font-weight: 700;
            color: var(--nst-black);
            font-family: monospace;
            background: #eee;
            padding: 2px 8px;
        }

        .btn-home {
            background: var(--nst-black);
            color: #ffffff;
            border: none;
            border-radius: 0;
            padding: 15px 40px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            text-decoration: none;
            transition: 0.4s;
            display: inline-block;
        }

        .btn-home:hover {
            background: #333;
            color: #fff;
            letter-spacing: 0.25em;
        }

        footer {
            text-align: center;
            padding: 40px 0;
            color: #9ca3af;
            font-size: 12px;
        }
    </style>
</head>

<body>

    <header class="nst-header">
        <a href="/" class="nst-logo">NST Fashion</a>
    </header>

    <div class="container my-5 flex-grow-1 d-flex align-items: center;">
        <div class="success-container">
            <div class="icon-box">
                ✓
            </div>
            <h1 class="status-title">Order Confirmed</h1>
            <p style="color: var(--text-gray);">Thank you for shopping with NST Fashion. Your order has been placed
                successfully and is being processed.</p>

            <div class="order-info">
                <p class="mb-1" style="font-size: 14px; color: var(--text-gray);">Transaction Reference</p>
                <span class="tran-id">{{ tran_id }}</span>
            </div>

            <p class="mb-4" style="font-size: 14px;">A confirmation email will be sent to you shortly.</p>

            <a href="/" class="btn-home">Continue Shopping</a>
        </div>
    </div>

    <footer>
        &copy; 2026 NST FASHION | PREMIUM COLLECTION
    </footer>

</body>

</html>
